<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" role="img" aria-label="Applixus hero görseli: mobil ve web çözümleri">
  <defs>
    <linearGradient id="h-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e1b4b"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="h-acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="0.5" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <radialGradient id="h-glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="520" rx="28" fill="url(#h-bg)"/>
  <rect width="600" height="520" rx="28" fill="url(#h-glow)"/>
  <!-- central phone -->
  <g transform="translate(210,90)">
    <rect x="0" y="0" width="180" height="340" rx="28" fill="#0b1020" stroke="url(#h-acc)" stroke-width="2"/>
    <rect x="14" y="22" width="152" height="296" rx="14" fill="#11162e"/>
    <circle cx="90" cy="14" r="4" fill="#3b3f5e"/>
    <rect x="64" y="8" width="52" height="8" rx="4" fill="#3b3f5e"/>
    <!-- app content -->
    <rect x="28" y="42" width="124" height="40" rx="10" fill="url(#h-acc)"/>
    <rect x="28" y="94" width="124" height="14" rx="7" fill="#2a2f52"/>
    <rect x="28" y="116" width="92" height="14" rx="7" fill="#232846"/>
    <rect x="28" y="150" width="58" height="58" rx="12" fill="#1d2240" stroke="#3b3f5e"/>
    <rect x="94" y="150" width="58" height="58" rx="12" fill="#1d2240" stroke="#3b3f5e"/>
    <rect x="28" y="216" width="58" height="58" rx="12" fill="#1d2240" stroke="#3b3f5e"/>
    <rect x="94" y="216" width="58" height="58" rx="12" fill="url(#h-acc)" opacity="0.85"/>
    <rect x="28" y="284" width="124" height="22" rx="11" fill="url(#h-acc)"/>
  </g>
  <!-- floating chips -->
  <g font-family="Inter, -apple-system, Segoe UI, Roboto, sans-serif" font-size="13" font-weight="600">
    <g transform="translate(40,120)">
      <rect width="150" height="40" rx="20" fill="#ffffff" opacity="0.08" stroke="#ffffff" stroke-opacity="0.15"/>
      <circle cx="22" cy="20" r="8" fill="url(#h-acc)"/>
      <text x="40" y="25" fill="#e2e8f5">iOS, Android &amp; Web</text>
    </g>
    <g transform="translate(410,90)">
      <rect width="150" height="40" rx="20" fill="#ffffff" opacity="0.08" stroke="#ffffff" stroke-opacity="0.15"/>
      <circle cx="22" cy="20" r="8" fill="url(#h-acc)"/>
      <text x="40" y="25" fill="#e2e8f5">Yenilikçi Çözümler</text>
    </g>
    <g transform="translate(20,300)">
      <rect width="160" height="40" rx="20" fill="#ffffff" opacity="0.08" stroke="#ffffff" stroke-opacity="0.15"/>
      <circle cx="22" cy="20" r="8" fill="url(#h-acc)"/>
      <text x="40" y="25" fill="#e2e8f5">Güvenlik &amp; Gizlilik</text>
    </g>
    <g transform="translate(420,330)">
      <rect width="160" height="40" rx="20" fill="#ffffff" opacity="0.08" stroke="#ffffff" stroke-opacity="0.15"/>
      <circle cx="22" cy="20" r="8" fill="url(#h-acc)"/>
      <text x="40" y="25" fill="#e2e8f5">Yapay Zeka Deneyimi</text>
    </g>
  </g>
</svg>
